services:
  - type: web
    name: my-mcp-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: MCP_API_TOKEN
        generateValue: true
      - key: PORT
        value: "10000"
